name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Start server
        run: |
          cd backend
          GOOGLE_API_KEY=test uvicorn main:app --host 0.0.0.0 --port 8000 &

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/health > /dev/null 2>&1; then
              echo "Server up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Server did not start in time" && exit 1

      - name: GET /health
        run: |
          response=$(curl -sf http://127.0.0.1:8000/health)
          echo "$response"
          echo "$response" | grep -q '"ok"'
