<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>whereis &lt;my-command&gt;</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: ui-monospace, "Cascadia Code", "Source Code Pro", Menlo, monospace;
      background: #000000;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 1.5rem 2rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #d74726;
      letter-spacing: -0.5px;
    }

    h1 span { color: #f8fafc; }

    .tagline {
      margin-top: 0.5rem;
      color: #94a3b8;
      font-size: 0.95rem;
    }

    .search-row {
      position: relative;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    input {
      width: 540px;
      padding: 0.75rem 1rem;
      background: #f1f5f9;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #2a3347;
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: #d74726; }
    input::placeholder { color: #94a3b8; }

    button {
      padding: 0.75rem 1.25rem;
      background: #d74726;
      color: #000000;
      border: none;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    button:hover { background: #e8633f; }
    button:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    button.stop { background: #c8c8c8; color: #000000; }
    button.stop:hover { background: #e0e0e0; }

    #result {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
    }

    .command-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    code {
      font-family: inherit;
      font-size: 1rem;
      color: #d74726;
      word-break: break-all;
    }

    .copy-btn {
      padding: 0.3rem 0.7rem;
      font-size: 0.8rem;
      background: #000000;
      color: #94a3b8;
      border: 1px solid #334155;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
    }

    .copy-btn:hover { color: #f1f5f9; border-color: #94a3b8; }

    .explanation {
      color: #cbd5e1;
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 1rem;
    }

    .source {
      font-size: 0.8rem;
      color: #475569;
    }

    .source a { color: #d74726; text-decoration: none; }
    .source a:hover { text-decoration: underline; }

    .hint {
      width: 100%;
      max-width: 640px;
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 1.5rem;
    }

    .hint em { font-style: normal; color: #94a3b8; }

    .corpus-note {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1rem;
      width: 100%;
      max-width: 640px;
      font-size: 0.8rem;
      color: #94a3b8;
      margin-top: 1.5rem;
    }

    .corpus-note a { color: #94a3b8; text-decoration: underline; white-space: nowrap; }
    .corpus-note a:hover { color: #cbd5e1; }

    #error {
      width: 100%;
      max-width: 640px;
      color: #f87171;
      font-size: 0.9rem;
      display: none;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid #334155;
      border-top-color: #d74726;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      position: absolute;
      left: calc(100% + 0.5rem);
      top: 50%;
      margin-top: -9px;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <h1>whereis <span>&lt;my-command&gt;</span></h1>
    <p class="tagline">Describe what you want to do. Get the command.</p>
  </header>

  <div class="search-row">
    <input id="query" type="text" placeholder="e.g. recursively find files modified in the last 24 hours" autofocus autocomplete="off" />
    <button id="submit-btn" onclick="search()">Search</button>
    <div class="spinner" id="spinner"></div>
  </div>

  <p class="hint">Defaults to Linux / common commands. Add <em>on macOS</em>, <em>on Windows</em>, <em>on Android</em>, etc. to target a specific platform</p>

  <div id="error"></div>

  <div id="result"></div>

  <div class="corpus-note">
    <span>Search <a href="https://tldr.sh" target="_blank" rel="noopener noreferrer">tldr-pages</a> CLI docs<span id="page-count"></span></span>
    <a href="https://github.com/rick-does/whereis-my-command/issues" target="_blank" rel="noopener noreferrer">Feedback / issues</a>
  </div>

  <script>
    const input = document.getElementById("query");
    input.addEventListener("keydown", e => { if (e.key === "Enter") search(); });

    const submitBtn = document.getElementById("submit-btn");
    submitBtn.style.width = submitBtn.offsetWidth + "px";

    fetch("/stats").then(r => r.json()).then(data => {
      if (data.pages) {
        document.getElementById("page-count").textContent = ` (${data.pages.toLocaleString()} pages)`;
      }
    }).catch(() => {});

    let controller = null;

    function stopSearch() {
      if (controller) controller.abort();
    }

    async function search() {
      const q = input.value.trim();
      if (!q) return;

      const btn = document.getElementById("submit-btn");
      const spinner = document.getElementById("spinner");
      const errorEl = document.getElementById("error");
      const resultEl = document.getElementById("result");

      controller = new AbortController();
      btn.textContent = "Stop";
      btn.classList.add("stop");
      btn.onclick = stopSearch;
      spinner.style.display = "block";
      errorEl.style.display = "none";
      resultEl.innerHTML = "";

      try {
        const res = await fetch("/query", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query: q }),
          signal: controller.signal,
        });

        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.detail || `Error ${res.status}`);
        }

        const data = await res.json();
        resultEl.innerHTML = "";
        data.results.forEach((r) => {
          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `
            <div class="command-row">
              <code data-raw="${escHtml(r.command)}">${escHtml(r.command)}</code>
              <button class="copy-btn" onclick="copyCard(this)">Copy</button>
            </div>
            <p class="explanation">${escHtml(r.explanation)}</p>
            <p class="source">Source: <a href="https://tldr.sh/" target="_blank" rel="noopener noreferrer">${escHtml(r.source)}</a> via <a href="https://tldr.sh" target="_blank" rel="noopener noreferrer">tldr-pages</a></p>
          `;
          resultEl.appendChild(card);
        });
      } catch (err) {
        if (err.name !== "AbortError") {
          errorEl.textContent = err.message;
          errorEl.style.display = "block";
        }
      } finally {
        controller = null;
        btn.textContent = "Search";
        btn.classList.remove("stop");
        btn.onclick = search;
        spinner.style.display = "none";
      }
    }

    function copyCard(btn) {
      const cmd = btn.closest(".card").querySelector("code").dataset.raw || "";
      navigator.clipboard.writeText(cmd).then(() => {
        btn.style.background = "#d74726";
        btn.style.color = "#000000";
        setTimeout(() => { btn.style.background = ""; btn.style.color = ""; }, 750);
      }).catch(() => {
        btn.style.background = "#fbbf24";
        btn.style.color = "#000000";
        setTimeout(() => { btn.style.background = ""; btn.style.color = ""; }, 750);
      });
    }

    function escHtml(str) {
      return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
    }
  </script>
</body>
</html>
